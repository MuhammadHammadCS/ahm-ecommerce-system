<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History - AHM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">AHM</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-primary btn-sm me-2">Back to Shop</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h2 class="mb-4">Your Order History</h2>
        <div id="orders-container">
            <div class="text-center text-muted">Loading orders...</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchOrders);

        async function fetchOrders() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/views/login.html';
                return;
            }

            try {
                const res = await fetch('/api/orders/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await res.json();
                const container = document.getElementById('orders-container');
                
                container.innerHTML = '';
                if(orders.length === 0) {
                    container.innerHTML = '<div class="alert alert-secondary border-0 text-center p-5"><h4>You have no previous orders.</h4><a href="/" class="btn btn-primary mt-3">Start Shopping</a></div>';
                    return;
                }

                orders.forEach(order => {
                    let itemsHtml = '';
                    order.items.forEach(item => {
                        itemsHtml += `
                            <div class="d-flex align-items-center mb-3">
                                <img src="${item.image_url}" style="width: 60px; height: 60px; object-fit: contain;" class="me-3 border rounded p-1 bg-white">
                                <div>
                                    <p class="mb-0 fw-bold">${item.name}</p>
                                    <p class="mb-0 small text-muted">Qty: ${item.quantity} | $${item.price}</p>
                                </div>
                            </div>
                        `;
                    });

                    const date = new Date(order.created_at).toLocaleDateString();
                    container.innerHTML += `
                        <div class="card mb-4 shadow-sm">
                            <div class="card-header bg-white d-flex flex-wrap justify-content-between align-items-center py-3 border-bottom">
                                <div class="me-3 mb-2 mb-md-0">
                                    <span class="text-muted small d-block text-uppercase fw-bold">Order Placed</span>
                                    <span>${date}</span>
                                </div>
                                <div class="me-3 mb-2 mb-md-0">
                                    <span class="text-muted small d-block text-uppercase fw-bold">Total</span>
                                    <span class="text-primary fw-bold">$${order.total_amount}</span>
                                </div>
                                <div class="me-3 mb-2 mb-md-0">
                                    <span class="text-muted small d-block text-uppercase fw-bold">Order #</span>
                                    <span>${order.id}</span>
                                </div>
                                <div>
                                    <span class="badge bg-success px-3 py-2 text-uppercase rounded-pill">${order.status}</span>
                                </div>
                            </div>
                            <div class="card-body bg-light">
                                <h6 class="mb-3 fw-bold">Items in your order:</h6>
                                ${itemsHtml}
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                document.getElementById('orders-container').innerHTML = '<div class="text-danger">Failed to load orders.</div>';
            }
        }
    </script>
</body>
</html>
