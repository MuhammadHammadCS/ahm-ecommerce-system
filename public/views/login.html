<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Login</h2>
                        <div id="alertMsg" class="alert d-none"></div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                            <div class="text-center mt-3">
                                <a href="/views/register.html" class="text-decoration-none">Don't have an account? Register</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMsg');

            try {
                // Call our Node.js API
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                alertMsg.classList.remove('d-none', 'alert-danger', 'alert-success');
                
                if (res.ok) {
                    alertMsg.classList.add('alert-success');
                    alertMsg.textContent = data.message;
                    
                    // Security choice: Save JWT token in localStorage for session management
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect to home page
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    alertMsg.classList.add('alert-danger');
                    alertMsg.textContent = data.message;
                }
            } catch (err) {
                console.error('Error:', err);
                alertMsg.classList.remove('d-none');
                alertMsg.classList.add('alert-danger');
                alertMsg.textContent = 'A network error occurred. Is the server running?';
            }
        });
    </script>
</body>
</html>
