<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Create an Account</h2>
                        <div id="alertMsg" class="alert d-none"></div>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                            <div class="text-center mt-3">
                                <a href="/views/login.html" class="text-decoration-none">Already have an account? Login</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertMsg = document.getElementById('alertMsg');

            try {
                // Call our Node.js API
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await res.json();
                
                // Clear existing alert classes
                alertMsg.classList.remove('d-none', 'alert-danger', 'alert-success');
                
                if (res.ok) {
                    alertMsg.classList.add('alert-success');
                    alertMsg.textContent = data.message + '. Redirecting to login...';
                    // Wait 2 seconds then redirect to login page
                    setTimeout(() => window.location.href = '/views/login.html', 2000);
                } else {
                    alertMsg.classList.add('alert-danger');
                    alertMsg.textContent = data.message;
                }
            } catch (err) {
                console.error('Error:', err);
                alertMsg.classList.remove('d-none');
                alertMsg.classList.add('alert-danger');
                alertMsg.textContent = 'A network error occurred. Is the server running?';
            }
        });
    </script>
</body>
</html>
