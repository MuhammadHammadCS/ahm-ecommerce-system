<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - AHM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">AHM</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-primary btn-sm me-2">Back to Shop</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 fw-bold">Shopping Cart</h2>
        <div class="row">
            <div class="col-lg-8" id="cart-items-container">
                <div class="text-center text-muted" id="loading-spinner">Loading cart...</div>
                <!-- Items injected here via JS -->
            </div>

            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="card shadow-sm border-0 sticky-top" style="top: 100px;">
                    <div class="card-body">
                        <h4 class="card-title mb-4 fw-bold">Order Summary</h4>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Subtotal</span>
                            <span class="fw-bold fs-4 text-primary" id="cart-total">$0.00</span>
                        </div>
                        <hr>
                        <button class="btn btn-primary w-100 py-2" onclick="checkout()">Proceed to Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchCart);

        async function fetchCart() {
            const container = document.getElementById('cart-items-container');
            const totalElement = document.getElementById('cart-total');
            const token = localStorage.getItem('token');

            if (!token) {
                window.location.href = '/views/login.html';
                return;
            }

            try {
                const res = await fetch('/api/cart', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = '/views/login.html';
                    return;
                }

                const cartItems = await res.json();
                container.innerHTML = ''; // clear loading

                if (cartItems.length === 0) {
                    container.innerHTML = `
                        <div class="card border-0 shadow-sm p-5 text-center">
                            <h4 class="text-muted">Your cart is empty.</h4>
                            <p class="mb-4">Looks like you haven't added anything yet.</p>
                            <a href="/" class="btn btn-primary px-4">Start Shopping</a>
                        </div>`;
                    totalElement.textContent = '$0.00';
                    return;
                }

                let total = 0;
                cartItems.forEach(item => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;

                    const card = document.createElement('div');
                    card.className = 'card mb-3 border-0 shadow-sm';
                    card.innerHTML = `
                        <div class="row g-0 align-items-center p-3">
                            <div class="col-3 text-center">
                                <img src="${item.image_url}" class="img-fluid rounded" alt="${item.name}" style="height: 80px; object-fit: contain;">
                            </div>
                            <div class="col-6">
                                <div class="card-body p-2">
                                    <h5 class="card-title fs-5 mb-1">${item.name}</h5>
                                    <p class="card-text text-muted mb-0">Qty: ${item.quantity} × $${item.price}</p>
                                </div>
                            </div>
                            <div class="col-3 text-end">
                                <p class="fw-bold fs-5 text-primary mb-2">$${itemTotal.toFixed(2)}</p>
                                <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${item.cart_item_id})">Remove</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                totalElement.textContent = '$' + total.toFixed(2);
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="text-danger">Failed to load cart. Ensure server is running.</div>';
            }
        }

        async function removeItem(cartItemId) {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/cart/${cartItemId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchCart(); // Immediately refresh the cart UI after deletion
                }
            } catch (err) {
                console.error(err);
            }
        }

        function checkout() {
            window.location.href = '/views/checkout.html';
        }
    </script>
</body>

</html>
